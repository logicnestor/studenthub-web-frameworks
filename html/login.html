<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>StudentHub | Login</title>
        <meta name="description" content="Login to StudenHub">
        <link rel="stylesheet" href="../css/style.css">
    </head>

    <body>

        <header>
            <div class="container">
                <h1>StudentHub</h1>

            <nav aria-label="Main Navigation">
                <a href="index.html">Home</a>
                <a href="about.html">About</a>
                <a href="login.html" aria-current="page">Login</a>
            </nav>
            </div>
        </header>

        <main>
            <section class="login-section">

                <h2>Login</h2>

                <form action="#" method="post">
                    
                    <p>
                        <label for="role">Select Role</label><br>
                        <select id="role" name="role" required>
                            <option value="">--Select Role--</option>
                            <option value="student">Student</option>
                            <option value="faculty">Faculty</option>
                            <option value="admin">Admin</option>
                        </select>
                    </p>

                    <p>
                        <label for="username">
                            Enrollment Number / Username
                        </label><br>

                        <input type="text" id="username" name="username" placeholder="Enter Enrollment Number or Username" required>

                    </p>

                    <p>
                        <label for="password">
                            Password
                        </label><br>

                        <input type="password" id="password" name="password" placeholder="Enter Password" required>
                    </p>

                    <p>
                        <button type="submit">Login</button>
                    </p>
                </form>

                <p>
                    <a href="#">Forgot Password?</a>
                </p>

            </section>
        </main>

        <footer>
            <div class="container">
                <p>
                &copy; 2026 StudentHub.
                All Rights Reserved.
            </p>
            </div>
        </footer>
    </body>
</html>
